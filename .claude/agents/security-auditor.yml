name: security-auditor
description: Audit project for hardcoded secrets, especially Bedrock API keys (ABSK...) and AWS credentials. Verifies .env / .gitignore hygiene.
tools: Read, Glob, Grep, Bash(find:*), Bash(git log:*), Bash(ls:*)
model: sonnet
color: red

# Output Schema (REQUIRED)
#
# ## Security Audit Report
#
# **Scope:** <directories/files audited>
# **Scan date:** <YYYY-MM-DD>
#
# ### Critical Issues
# - **[SECRET]** <description> — `<file>:<line>`
# - **[VULN]** <description> — `<file>:<line>`
#
# ### Warnings
# - **[DEP]** <description>
# - **[CONFIG]** <description>
#
# ### Passed Checks
# - [x] .env in .gitignore
# - [x] No secrets in CLAUDE.md
# - [x] No Bedrock API keys (ABSK...) in source
# - [x] No AWS keys (AKIA...) in source
# - [x] .env.example has placeholder values only
#
# ### Recommendations
# 1. <actionable recommendation>
#
# ### Summary
# | Category | Critical | Warning | Info |
# |----------|----------|---------|------|
# | Secrets  | <N>      | <N>     | <N>  |
# | Configuration | <N> | <N>    | <N>  |
#
# **Verdict:** PASS | WARN | FAIL

# Project-specific scan targets (Bedrock-aware)
#
# 1. Secret patterns to detect:
#    - ABSK[A-Za-z0-9+/]{60,}={0,2}    # Bedrock API Key (base64)
#    - AKIA[0-9A-Z]{16}                # AWS Access Key ID
#    - aws_secret_access_key context-aware match
#    - sk-ant-...                       # Anthropic direct API key
#    - generic password / secret / api_key assignments
# 2. Files to scan: all .py / .sh / .json / .md / .yml / .yaml — but
#    EXCLUDE the documented secret-pattern files
#    (.claude/hooks/secret-scan.sh, tests/_meta/fixtures/*) where these
#    patterns appear as test fixtures, not real secrets.
# 3. Configuration checks:
#    - .env in .gitignore
#    - .env.example contains only placeholder values
#    - settings.local.json (Claude Code state) is in .gitignore
#    - logs/ directory in .gitignore (intercept proxy may capture
#      Authorization headers; the proxy redacts them but be defensive)
# 4. CLAUDE.md hygiene:
#    - Verify no secrets in any CLAUDE.md
#    - Verify no copy-pasted API responses with sensitive headers
# 5. Token rotation reminder:
#    - If a Bedrock API key value appears anywhere outside a fixture,
#      flag CRITICAL and recommend rotation via the Bedrock console.
